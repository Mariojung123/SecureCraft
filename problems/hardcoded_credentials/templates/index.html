<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AdminPortal – Access Control</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    body{background:#f1f5f9;min-height:100vh}
    nav{background:#1e293b;padding:13px 24px;display:flex;align-items:center;gap:10px}
    .logo{color:#fff;font-weight:700;font-size:15px}
    .tag{background:#dc2626;color:#fff;font-size:10px;padding:2px 9px;border-radius:99px;font-weight:600;letter-spacing:.06em}
    .wrap{max-width:560px;margin:40px auto;padding:0 16px}
    .card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 3px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.04);margin-bottom:16px}
    h2{font-size:15px;font-weight:600;color:#1e293b;margin-bottom:4px}
    .sub{font-size:13px;color:#64748b;margin-bottom:20px}
    label{display:block;font-size:11px;font-weight:600;color:#64748b;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
    .row{display:flex;gap:8px}
    input{flex:1;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:14px;color:#1e293b;outline:none;font-family:monospace}
    input:focus{border-color:#dc2626;box-shadow:0 0 0 3px rgba(220,38,38,.12)}
    button{background:#1e293b;color:#fff;border:none;padding:9px 18px;border-radius:7px;font-size:14px;font-weight:500;cursor:pointer}
    button:hover{background:#0f172a}
    button:disabled{opacity:.5;cursor:default}
    .resp{margin-top:16px;padding:14px;border-radius:8px;font-family:monospace;font-size:13px;line-height:1.6;display:none;white-space:pre-wrap;word-break:break-all}
    .ok{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
    .err{background:#fff1f2;color:#be123c;border:1px solid #fecdd3}
    .hint{font-size:12px;color:#94a3b8;margin-top:10px}
    .lock{font-size:40px;text-align:center;margin-bottom:12px}
  </style>
</head>
<body>
  <nav><span class="logo">&#128274; AdminPortal</span><span class="tag">RESTRICTED ACCESS</span></nav>
  <div class="wrap">
    <div class="card">
      <div class="lock">&#128272;</div>
      <h2>Admin API Access</h2>
      <p class="sub">Provide your API key to access the admin dashboard.</p>
      <label for="key">X-Api-Key</label>
      <div class="row">
        <input id="key" type="text" placeholder="Enter your API key&hellip;" autocomplete="off" spellcheck="false">
        <button id="btn" onclick="tryAccess()">Access</button>
      </div>
      <div id="resp" class="resp"></div>
      <p class="hint">&#128274; The admin endpoint requires the correct API key in the <code>X-Api-Key</code> header.</p>
    </div>
  </div>
  <script>
    document.getElementById('key').addEventListener('keydown',e=>{if(e.key==='Enter')tryAccess()});
    function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
    async function tryAccess(){
      const key=document.getElementById('key').value.trim();
      const btn=document.getElementById('btn'),resp=document.getElementById('resp');
      btn.disabled=true;btn.textContent='Checking\u2026';
      resp.style.display='none';
      try{
        const r=await fetch('/admin',{headers:{'X-Api-Key':key}});
        const d=await r.json();
        resp.style.display='block';
        if(r.ok){resp.className='resp ok';resp.textContent='[200 OK] '+JSON.stringify(d,null,2)}
        else{resp.className='resp err';resp.textContent='['+r.status+'] '+JSON.stringify(d,null,2)}
      }catch(e){resp.style.display='block';resp.className='resp err';resp.textContent='Request failed: '+e}
      btn.disabled=false;btn.textContent='Access';
    }
  </script>
</body>
</html>
