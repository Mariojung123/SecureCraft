<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ProfileHub – User Accounts</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    body{background:#f1f5f9;min-height:100vh}
    nav{background:#0f172a;padding:13px 24px;display:flex;align-items:center;gap:10px}
    .logo{color:#fff;font-weight:700;font-size:15px}
    .tag{background:#0891b2;color:#fff;font-size:10px;padding:2px 9px;border-radius:99px;font-weight:600;letter-spacing:.06em}
    .nav-user{margin-left:auto;font-size:12px;color:#94a3b8}
    .wrap{max-width:560px;margin:40px auto;padding:0 16px}
    .card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 3px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.04);margin-bottom:16px}
    .session-banner{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:12px 16px;font-size:13px;color:#1d4ed8;margin-bottom:20px;display:flex;align-items:center;gap:8px}
    h2{font-size:15px;font-weight:600;color:#0f172a;margin-bottom:4px}
    .sub{font-size:13px;color:#64748b;margin-bottom:20px}
    label{display:block;font-size:11px;font-weight:600;color:#64748b;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
    .row{display:flex;gap:8px;align-items:center}
    input[type=number]{flex:1;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:14px;color:#0f172a;outline:none}
    input:focus{border-color:#0891b2;box-shadow:0 0 0 3px rgba(8,145,178,.12)}
    button{background:#0891b2;color:#fff;border:none;padding:9px 18px;border-radius:7px;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap}
    button:hover{background:#0e7490}
    button:disabled{opacity:.5;cursor:default}
    .profile{margin-top:16px;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;display:none}
    .profile-head{background:#0891b2;padding:16px;display:flex;align-items:center;gap:12px}
    .avatar{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.2);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700}
    .profile-name{color:#fff;font-weight:600;font-size:15px}
    .profile-id{color:rgba(255,255,255,.7);font-size:12px}
    .profile-body{padding:16px}
    .field-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1f5f9}
    .field-row:last-child{border-bottom:none}
    .field-key{font-size:12px;color:#64748b;font-weight:500}
    .field-val{font-size:13px;color:#1e293b;font-weight:500;font-family:monospace}
    .sensitive{color:#dc2626;background:#fff1f2;padding:1px 6px;border-radius:4px}
    .err-box{margin-top:16px;padding:12px 16px;background:#fff1f2;color:#be123c;border:1px solid #fecdd3;border-radius:8px;font-size:13px;display:none}
    .hint{font-size:12px;color:#94a3b8;margin-top:10px}
  </style>
</head>
<body>
  <nav>
    <span class="logo">&#128101; ProfileHub</span>
    <span class="tag">USER ACCOUNTS</span>
    <span class="nav-user">&#128274; Logged in as Alice (ID: 1)</span>
  </nav>
  <div class="wrap">
    <div class="card">
      <div class="session-banner">&#128100; You are authenticated as <strong>&nbsp;Alice&nbsp;</strong> (User ID: 1)</div>
      <h2>View User Profile</h2>
      <p class="sub">Enter a user ID to view their profile page.</p>
      <label for="uid">User ID</label>
      <div class="row">
        <input id="uid" type="number" min="1" value="1" placeholder="e.g. 1">
        <button id="btn" onclick="loadProfile()">View Profile</button>
      </div>
      <p class="hint">Try user IDs: 1 (you), 2, 3 &hellip;</p>
      <div id="profile" class="profile">
        <div class="profile-head">
          <div class="avatar" id="p-av"></div>
          <div><div class="profile-name" id="p-name"></div><div class="profile-id" id="p-id"></div></div>
        </div>
        <div class="profile-body">
          <div class="field-row"><span class="field-key">Username</span><span class="field-val" id="p-user"></span></div>
          <div class="field-row"><span class="field-key">Email</span><span class="field-val" id="p-email"></span></div>
          <div class="field-row"><span class="field-key">SSN</span><span class="field-val"><span class="sensitive" id="p-ssn"></span></span></div>
        </div>
      </div>
      <div id="err" class="err-box"></div>
    </div>
  </div>
  <script>
    function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
    async function loadProfile(){
      const uid=document.getElementById('uid').value;
      const btn=document.getElementById('btn'),profile=document.getElementById('profile'),err=document.getElementById('err');
      btn.disabled=true;btn.textContent='Loading\u2026';
      profile.style.display='none';err.style.display='none';
      try{
        const r=await fetch('/profile/'+encodeURIComponent(uid),{headers:{'X-User-Id':'1'}});
        const d=await r.json();
        if(r.ok){
          profile.style.display='block';
          document.getElementById('p-av').textContent=(d.username||'?')[0].toUpperCase();
          document.getElementById('p-name').textContent=d.username;
          document.getElementById('p-id').textContent='User ID: '+d.id;
          document.getElementById('p-user').textContent=d.username;
          document.getElementById('p-email').textContent=d.email;
          document.getElementById('p-ssn').textContent=d.ssn||'(none)';
        }else{err.style.display='block';err.textContent='Error '+r.status+': '+(d.error||'Access denied')}
      }catch(e){err.style.display='block';err.textContent='Request failed: '+e}
      btn.disabled=false;btn.textContent='View Profile';
    }
  </script>
</body>
</html>
