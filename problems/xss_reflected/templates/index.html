<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>QuickSearch</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    body{background:#f1f5f9;min-height:100vh}
    nav{background:#4f46e5;padding:13px 24px;display:flex;align-items:center;gap:10px}
    .logo{color:#fff;font-weight:700;font-size:15px}
    .tag{background:rgba(255,255,255,.2);color:#fff;font-size:10px;padding:2px 9px;border-radius:99px;font-weight:600;letter-spacing:.06em}
    .hero{display:flex;flex-direction:column;align-items:center;padding:60px 16px 40px}
    .hero h1{font-size:28px;font-weight:800;color:#1e293b;margin-bottom:8px}
    .hero p{font-size:14px;color:#64748b;margin-bottom:28px}
    form{display:flex;gap:8px;width:100%;max-width:480px}
    input{flex:1;padding:11px 16px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:15px;color:#1e293b;outline:none;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    input:focus{border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,.12)}
    button{background:#4f46e5;color:#fff;border:none;padding:11px 22px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
    button:hover{background:#4338ca}
    .tips{margin-top:20px;font-size:12px;color:#94a3b8;text-align:center}
    .tips code{background:#e2e8f0;padding:1px 6px;border-radius:4px;font-size:11px}
  </style>
</head>
<body>
  <nav><span class="logo">&#128269; QuickSearch</span><span class="tag">WEB SEARCH</span></nav>
  <div class="hero">
    <h1>Search the web</h1>
    <p>Enter a query below to find results.</p>
    <form method="get" action="/search">
      <input name="q" type="text" placeholder="What are you looking for?" autocomplete="off" autofocus>
      <button type="submit">Search</button>
    </form>
    <p class="tips">Try: <code>hello</code>, <code>world</code>, or anything you like</p>
  </div>
</body>
</html>
