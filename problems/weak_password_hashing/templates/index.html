<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>UserHub – Account Management</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    body{background:#f1f5f9;min-height:100vh}
    nav{background:#0f172a;padding:13px 24px;display:flex;align-items:center;gap:10px}
    .logo{color:#fff;font-weight:700;font-size:15px}
    .tag{background:#7c3aed;color:#fff;font-size:10px;padding:2px 9px;border-radius:99px;font-weight:600;letter-spacing:.06em}
    .wrap{max-width:520px;margin:40px auto;padding:0 16px}
    .card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 3px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.04);margin-bottom:16px}
    .tabs{display:flex;gap:4px;margin-bottom:20px;background:#f1f5f9;border-radius:8px;padding:4px}
    .tab{flex:1;text-align:center;padding:7px;border-radius:6px;font-size:13px;font-weight:500;color:#64748b;cursor:pointer;border:none;background:none}
    .tab.active{background:#fff;color:#7c3aed;box-shadow:0 1px 3px rgba(0,0,0,.08)}
    h2{font-size:15px;font-weight:600;color:#0f172a;margin-bottom:16px}
    label{display:block;font-size:11px;font-weight:600;color:#64748b;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
    .field{margin-bottom:14px}
    input{width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:14px;color:#0f172a;outline:none}
    input:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.12)}
    button{background:#7c3aed;color:#fff;border:none;padding:9px 18px;border-radius:7px;font-size:14px;font-weight:500;cursor:pointer;width:100%}
    button:hover{background:#6d28d9}
    button:disabled{opacity:.5;cursor:default}
    .msg{margin-top:12px;padding:10px 14px;border-radius:8px;font-size:13px;display:none}
    .ok{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
    .err{background:#fff1f2;color:#be123c;border:1px solid #fecdd3}
    .hash-box{background:#0f172a;color:#86efac;font-family:monospace;font-size:12px;padding:12px;border-radius:8px;word-break:break-all;margin-top:12px;display:none}
    .panel{display:none}.panel.active{display:block}
  </style>
</head>
<body>
  <nav><span class="logo">&#128101; UserHub</span><span class="tag">ACCOUNT MANAGEMENT</span></nav>
  <div class="wrap">
    <div class="card">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('reg',this)">Register</button>
        <button class="tab" onclick="switchTab('log',this)">Login</button>
        <button class="tab" onclick="switchTab('leak',this)">DB Leak</button>
      </div>

      <!-- Register -->
      <div id="reg" class="panel active">
        <h2>Create Account</h2>
        <div class="field"><label>Username</label><input id="r-u" type="text" placeholder="Choose a username" autocomplete="off"></div>
        <div class="field"><label>Password</label><input id="r-p" type="password" placeholder="Choose a password"></div>
        <button id="r-btn" onclick="doRegister()">Register</button>
        <div id="r-msg" class="msg"></div>
      </div>

      <!-- Login -->
      <div id="log" class="panel">
        <h2>Sign In</h2>
        <div class="field"><label>Username</label><input id="l-u" type="text" placeholder="Username" autocomplete="off"></div>
        <div class="field"><label>Password</label><input id="l-p" type="password" placeholder="Password"></div>
        <button id="l-btn" onclick="doLogin()">Sign In</button>
        <div id="l-msg" class="msg"></div>
      </div>

      <!-- DB Leak -->
      <div id="leak" class="panel">
        <h2>Simulated DB Leak</h2>
        <p style="font-size:13px;color:#64748b;margin-bottom:16px">Enter a username to retrieve the stored password hash (simulates a database breach).</p>
        <div class="field"><label>Username</label><input id="h-u" type="text" placeholder="Username to look up" autocomplete="off"></div>
        <button id="h-btn" onclick="getHash()">Get Hash</button>
        <div id="h-box" class="hash-box"></div>
        <div id="h-msg" class="msg"></div>
      </div>
    </div>
  </div>
  <script>
    function switchTab(id,el){
      document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      el.classList.add('active');
    }
    function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
    function setMsg(id,ok,txt){const el=document.getElementById(id);el.style.display='block';el.className='msg '+(ok?'ok':'err');el.textContent=txt}
    async function doRegister(){
      const u=document.getElementById('r-u').value,p=document.getElementById('r-p').value;
      const btn=document.getElementById('r-btn');btn.disabled=true;btn.textContent='Registering\u2026';
      try{
        const r=await fetch('/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
        const d=await r.json();
        setMsg('r-msg',d.ok,'Account created! Your password was stored as a hash.');
      }catch(e){setMsg('r-msg',false,'Request failed.')}
      btn.disabled=false;btn.textContent='Register';
    }
    async function doLogin(){
      const u=document.getElementById('l-u').value,p=document.getElementById('l-p').value;
      const btn=document.getElementById('l-btn');btn.disabled=true;btn.textContent='Signing in\u2026';
      try{
        const r=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
        const d=await r.json();
        setMsg('l-msg',d.success,d.success?'Login successful!':'Invalid credentials.');
      }catch(e){setMsg('l-msg',false,'Request failed.')}
      btn.disabled=false;btn.textContent='Sign In';
    }
    async function getHash(){
      const u=document.getElementById('h-u').value.trim();
      const btn=document.getElementById('h-btn'),box=document.getElementById('h-box');
      btn.disabled=true;btn.textContent='Fetching\u2026';
      box.style.display='none';
      try{
        const r=await fetch('/hash?user='+encodeURIComponent(u));
        const d=await r.json();
        if(d.hash){box.style.display='block';box.textContent=u+':'+d.hash}
        else{setMsg('h-msg',false,'User not found or no hash stored.')}
      }catch(e){setMsg('h-msg',false,'Request failed.')}
      btn.disabled=false;btn.textContent='Get Hash';
    }
  </script>
</body>
</html>
