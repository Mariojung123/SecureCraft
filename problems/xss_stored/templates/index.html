<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Community Board</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    body{background:#f1f5f9;min-height:100vh}
    nav{background:#0f172a;padding:13px 24px;display:flex;align-items:center;gap:10px}
    .logo{color:#fff;font-weight:700;font-size:15px}
    .tag{background:#8b5cf6;color:#fff;font-size:10px;padding:2px 9px;border-radius:99px;font-weight:600;letter-spacing:.06em}
    .wrap{max-width:580px;margin:40px auto;padding:0 16px}
    .card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 3px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.04);margin-bottom:16px}
    h2{font-size:15px;font-weight:600;color:#0f172a;margin-bottom:16px}
    .comment{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid #f1f5f9}
    .comment:last-child{border-bottom:none}
    .avatar{width:36px;height:36px;border-radius:50%;background:#8b5cf6;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
    .body{flex:1}
    .text{font-size:14px;color:#334155;line-height:1.5}
    .empty{font-size:14px;color:#94a3b8;text-align:center;padding:16px 0}
    label{display:block;font-size:11px;font-weight:600;color:#64748b;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
    textarea{width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;color:#1e293b;outline:none;resize:vertical;min-height:80px;font-family:inherit}
    textarea:focus{border-color:#8b5cf6;box-shadow:0 0 0 3px rgba(139,92,246,.12)}
    button{background:#8b5cf6;color:#fff;border:none;padding:9px 18px;border-radius:7px;font-size:14px;font-weight:500;cursor:pointer;margin-top:10px}
    button:hover{background:#7c3aed}
  </style>
</head>
<body>
  <nav><span class="logo">&#128172; Community Board</span><span class="tag">PUBLIC FORUM</span></nav>
  <div class="wrap">
    <div class="card">
      <h2>Recent Comments</h2>
      {{ items | safe }}
    </div>
    <div class="card">
      <h2>Leave a Comment</h2>
      <form method="post" action="/comment">
        <label for="text">Your message</label>
        <textarea id="text" name="text" placeholder="Share your thoughts&hellip;"></textarea>
        <button type="submit">Post Comment</button>
      </form>
    </div>
  </div>
</body>
</html>
