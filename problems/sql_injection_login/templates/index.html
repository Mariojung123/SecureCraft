<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SecureBank – Sign In</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    body{background:#f1f5f9;min-height:100vh;display:flex;flex-direction:column}
    nav{background:#1e3a5f;padding:13px 24px;display:flex;align-items:center;gap:10px}
    .logo{color:#fff;font-weight:700;font-size:15px}
    .tag{background:#3b82f6;color:#fff;font-size:10px;padding:2px 9px;border-radius:99px;font-weight:600;letter-spacing:.06em}
    .center{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 16px}
    .card{background:#fff;border-radius:14px;padding:32px;box-shadow:0 4px 24px rgba(0,0,0,.1);width:100%;max-width:360px}
    .card-title{font-size:20px;font-weight:700;color:#1e3a5f;margin-bottom:4px}
    .card-sub{font-size:13px;color:#64748b;margin-bottom:24px}
    label{display:block;font-size:11px;font-weight:600;color:#64748b;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
    .field{margin-bottom:16px}
    input{width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;color:#1e293b;outline:none}
    input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.12)}
    button{width:100%;background:#1e3a5f;color:#fff;border:none;padding:11px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
    button:hover{background:#1e4d8c}
    button:disabled{opacity:.5;cursor:default}
    #msg{margin-top:16px;padding:10px 14px;border-radius:8px;font-size:13px;display:none}
    .ok{background:#dcfce7;color:#166534;border:1px solid #bbf7d0}
    .err{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
    .hint{font-size:11px;color:#94a3b8;text-align:center;margin-top:20px}
  </style>
</head>
<body>
  <nav><span class="logo">&#127968; SecureBank</span><span class="tag">ONLINE BANKING</span></nav>
  <div class="center">
    <div class="card">
      <div class="card-title">Sign in</div>
      <div class="card-sub">Access your account securely.</div>
      <div class="field"><label for="u">Username</label><input id="u" type="text" placeholder="Enter username" autocomplete="off"></div>
      <div class="field"><label for="p">Password</label><input id="p" type="password" placeholder="Enter password"></div>
      <button id="btn" onclick="doLogin()">Sign In</button>
      <div id="msg"></div>
      <p class="hint">Demo credentials: admin / supersecret123</p>
    </div>
  </div>
  <script>
    document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
    function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
    async function doLogin(){
      const u=document.getElementById('u').value,p=document.getElementById('p').value;
      const btn=document.getElementById('btn'),msg=document.getElementById('msg');
      btn.disabled=true;btn.textContent='Signing in\u2026';
      msg.style.display='none';
      try{
        const r=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
        const d=await r.json();
        msg.style.display='block';
        if(d.success){msg.className='ok';msg.textContent='Welcome back, '+esc(d.user||u)+'!'}
        else{msg.className='err';msg.textContent='Invalid username or password.'}
      }catch(e){msg.style.display='block';msg.className='err';msg.textContent='Request failed.'}
      btn.disabled=false;btn.textContent='Sign In';
    }
  </script>
</body>
</html>
